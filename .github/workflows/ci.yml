name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.22.0
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run check:public
        env:
          COFORGE_PUBLIC_RELEASE: "1"
      - run: npm run verify:reasonix
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run sbom
      - run: npm run verify:sbom
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coforge-cyclonedx-sbom
          path: artifacts/sbom/coforge.cdx.json
          if-no-files-found: error
          retention-days: 30

  docker-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build container image
        run: docker build --tag coforge:ci .
      - name: Smoke test non-root, read-only runtime
        run: bash ./scripts/docker-runtime-smoke.sh coforge:ci

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        with:
          fail-on-severity: high
